<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizmaster Panel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="master-body">
  <div class="master-layout">
    <aside class="player-sidebar">
      <h2>👥 Players</h2>
      <p id="playerCount" class="info">0 player(s)</p>
      <ul id="liveScoresList" class="live-scores"></ul>
    </aside>
    <div class="container master">
    <h1>🎯 Quizmaster Panel</h1>

    <div id="setupSection">
      <h2>Load Questions</h2>
      <p class="subtitle">Paste JSON array or use the sample questions</p>
      <textarea id="questionsInput" rows="10" placeholder='[
  {
    "text": "What is the capital of France?",
    "options": ["London", "Berlin", "Paris", "Madrid"],
    "correctIndex": 2
  }
]'></textarea>
      <div class="btn-row">
        <button onclick="loadQuestions()">Load Custom JSON</button>
        <button onclick="loadFromFile()">Load Comic Relief Questions</button>
        <button onclick="loadFunQuestions()">Load Fun Questions</button>
      </div>
      <p id="loadStatus" class="info"></p>
    </div>

    <div id="controlSection" class="hidden">
      <div id="currentQ" class="current-question"></div>
      <p id="masterTimer" class="timer-display"></p>
      <p id="answerProgress" class="info"></p>
      <div class="btn-row">
        <button id="revealBtn" onclick="revealAnswer()">Reveal Answer</button>
        <button id="nextBtn" onclick="nextQuestion()">Next Question ➡️</button>
      </div>
    </div>
    <div id="leaderboardSection" class="hidden">
      <h2>🏆 Final Leaderboard</h2>
      <div id="leaderboard"></div>
      <button onclick="resetGame()">Reset Game</button>
    </div>
  </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let questions = [];
    let currentIndex = -1;
    let masterTimerInterval = null;

    // Connection status
    socket.on('connect', () => {
      console.log('Socket connected:', socket.id);
      document.getElementById('loadStatus').textContent = '🟢 Connected to server';
    });
    socket.on('disconnect', () => {
      console.log('Socket disconnected');
      document.getElementById('loadStatus').textContent = '🔴 Disconnected from server';
    });
    socket.on('connect_error', (err) => {
      console.log('Socket connection error:', err.message);
      document.getElementById('loadStatus').textContent = '🔴 Connection error: ' + err.message;
    });

    const sampleQuestions = [
      { text: "What is the capital of Australia?", options: ["Sydney", "Melbourne", "Canberra", "Perth"], correctIndex: 2 },
      { text: "Which planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Saturn"], correctIndex: 1 },
      { text: "What year did the Titanic sink?", options: ["1905", "1912", "1920", "1898"], correctIndex: 1 },
      { text: "Who painted the Mona Lisa?", options: ["Michelangelo", "Raphael", "Da Vinci", "Rembrandt"], correctIndex: 2 },
      { text: "What is the largest ocean on Earth?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correctIndex: 3 },
      { text: "In which country would you find Machu Picchu?", options: ["Mexico", "Peru", "Colombia", "Chile"], correctIndex: 1 },
      { text: "What element does 'O' represent on the periodic table?", options: ["Osmium", "Oganesson", "Oxygen", "Gold"], correctIndex: 2 },
      { text: "How many sides does a hexagon have?", options: ["5", "6", "7", "8"], correctIndex: 1 },
      { text: "Which language has the most native speakers?", options: ["English", "Hindi", "Spanish", "Mandarin Chinese"], correctIndex: 3 },
      { text: "What is the smallest country in the world?", options: ["Monaco", "Vatican City", "San Marino", "Liechtenstein"], correctIndex: 1 },
    ];

    socket.on('playerCount', (count) => {
      document.getElementById('playerCount').textContent = count + ' player(s)';
    });

    socket.on('liveScores', (players) => {
      const list = document.getElementById('liveScoresList');
      list.innerHTML = players.map((p, i) => {
        const label = p.mode === 'team' ? `${p.name} <span class="team-tag">${p.team}</span>` : p.name;
        let avatarHtml = '';
        if (p.avatar && p.avatar.startsWith('data:')) {
          avatarHtml = `<img src="${p.avatar}" class="sidebar-avatar" alt="">`;
        } else if (p.avatar) {
          avatarHtml = `<span class="sidebar-avatar-emoji">${p.avatar}</span>`;
        }
        return `<li>${avatarHtml}${i + 1}. ${label} <span class="sidebar-score">${p.score} pts</span></li>`;
      }).join('');
    });
    socket.on('questionsLoaded', (data) => {
      document.getElementById('loadStatus').textContent = `✅ ${data.count} questions loaded`;
      document.getElementById('setupSection').classList.add('hidden');
      document.getElementById('controlSection').classList.remove('hidden');
      document.getElementById('currentQ').innerHTML = '<p>Ready! Click "Next Question" to begin.</p>';
    });

    socket.on('newQuestion', (q) => {
      currentIndex = q.index;
      const qData = questions[currentIndex];
      const correctAnswer = qData.options[qData.correctIndex];
      const category = qData.category ? `<p class="info">${qData.category}</p>` : '';
      document.getElementById('currentQ').innerHTML =
        category +
        `<h3>Q${q.index + 1}/${q.total}: ${q.text}</h3>` +
        q.options.map((o, i) => `<p class="${i === qData.correctIndex ? 'correct-answer' : ''}">${o}</p>`).join('') +
        `<p class="info">Correct: ${correctAnswer}</p>`;
      document.getElementById('answerProgress').textContent = '0 answers received';

      // Start master timer
      let timeLeft = 30;
      const timerEl = document.getElementById('masterTimer');
      timerEl.textContent = `⏱️ ${timeLeft}s remaining`;
      timerEl.className = 'timer-display';
      clearInterval(masterTimerInterval);
      masterTimerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = `⏱️ ${Math.max(0, timeLeft)}s remaining`;
        if (timeLeft <= 5) timerEl.className = 'timer-display timer-warning';
        if (timeLeft <= 0) {
          clearInterval(masterTimerInterval);
          timerEl.textContent = '⏱️ Time\'s up — auto-revealed';
        }
      }, 1000);
    });

    socket.on('answerProgress', (data) => {
      document.getElementById('answerProgress').textContent = `${data.answered}/${data.total} answers received`;
    });

    socket.on('answerRevealed', (data) => {
      clearInterval(masterTimerInterval);
      document.getElementById('masterTimer').textContent = '';
      // Show mini leaderboard
      let html = '<h3>Top 10</h3><ol class="leaderboard">';
      data.leaderboard.forEach(p => {
        html += `<li>${p.name} — ${p.score} pts</li>`;
      });
      html += '</ol>';
      document.getElementById('answerProgress').innerHTML = html;
    });

    socket.on('quizFinished', (data) => {
      document.getElementById('controlSection').classList.add('hidden');
      document.getElementById('leaderboardSection').classList.remove('hidden');
      let html = '<ol class="leaderboard final">';
      data.leaderboard.forEach((p, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        html += `<li>${medal} ${p.name} — ${p.score} pts</li>`;
      });
      html += '</ol>';
      document.getElementById('leaderboard').innerHTML = html;
    });

    socket.on('appError', (msg) => {
      document.getElementById('loadStatus').textContent = '❌ ' + msg;
    });

    function loadQuestions() {
      try {
        questions = JSON.parse(document.getElementById('questionsInput').value);
        socket.emit('loadQuestions', questions);
      } catch (e) {
        document.getElementById('loadStatus').textContent = '❌ Invalid JSON';
      }
    }

    function loadSample() {
      questions = sampleQuestions;
      document.getElementById('questionsInput').value = JSON.stringify(sampleQuestions, null, 2);
      socket.emit('loadQuestions', questions);
    }

    async function loadFromFile() {
      document.getElementById('loadStatus').textContent = '⏳ Loading questions...';
      try {
        const res = await fetch('/questions.json');
        if (!res.ok) {
          document.getElementById('loadStatus').textContent = '❌ Server returned ' + res.status;
          return;
        }
        questions = await res.json();
        document.getElementById('loadStatus').textContent = '⏳ Sending ' + questions.length + ' questions to server...';
        document.getElementById('questionsInput').value = JSON.stringify(questions, null, 2);
        socket.emit('loadQuestions', questions);
      } catch (e) {
        document.getElementById('loadStatus').textContent = '❌ Failed to load questions file: ' + e.message;
      }
    }

    async function loadFunQuestions() {
      document.getElementById('loadStatus').textContent = '⏳ Loading fun questions...';
      try {
        const res = await fetch('/questions-fun.json');
        if (!res.ok) {
          document.getElementById('loadStatus').textContent = '❌ Server returned ' + res.status;
          return;
        }
        questions = await res.json();
        document.getElementById('loadStatus').textContent = '⏳ Sending ' + questions.length + ' questions to server...';
        document.getElementById('questionsInput').value = JSON.stringify(questions, null, 2);
        socket.emit('loadQuestions', questions);
      } catch (e) {
        document.getElementById('loadStatus').textContent = '❌ Failed to load fun questions: ' + e.message;
      }
    }

    function nextQuestion() { socket.emit('nextQuestion'); }
    function revealAnswer() { socket.emit('revealAnswer'); }
    function resetGame() {
      socket.emit('resetGame');
      document.getElementById('leaderboardSection').classList.add('hidden');
      document.getElementById('setupSection').classList.remove('hidden');
    }
  </script>
</body>
</html>
