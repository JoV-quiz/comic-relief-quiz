<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Play</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div id="waiting">
      <h1>🧠 You're in!</h1>
      <p id="playerInfo" class="subtitle"></p>
      <p class="subtitle">Waiting for the quizmaster to start...</p>
      <p id="playerCount" class="info"></p>
    </div>
    <div id="questionView" class="hidden">
      <div class="question-header">
        <span id="qNumber"></span>
        <div class="timer-dial">
          <svg viewBox="0 0 100 100" class="timer-svg">
            <circle cx="50" cy="50" r="45" class="timer-track"/>
            <circle cx="50" cy="50" r="45" id="timerRing" class="timer-ring"/>
          </svg>
          <span id="timerText" class="timer-text">30</span>
        </div>
      </div>
      <h2 id="qText"></h2>
      <div id="options"></div>
      <div id="feedback" class="hidden"></div>
    </div>
    <div id="revealView" class="hidden">
      <h2>Answer Revealed</h2>
      <p id="revealText"></p>
      <p id="scoreText" class="score"></p>
    </div>
    <div id="finishedView" class="hidden">
      <h1>🏆 Quiz Complete!</h1>
      <div id="myResult" class="my-result"></div>
      <div id="finalLeaderboard"></div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const name = localStorage.getItem('quizName');
    const mode = localStorage.getItem('quizMode') || 'individual';
    const team = localStorage.getItem('quizTeam') || '';
    const avatar = localStorage.getItem('quizAvatar') || '';
    if (!name) window.location.href = '/';

    let timerInterval = null;
    let myScore = 0;
    let hasAnswered = false;

    // --- Web Audio API sound effects ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let countdownNodes = [];

    function playCountdownMusic() {
      stopCountdown();
      const now = audioCtx.currentTime;
      const master = audioCtx.createGain();
      master.gain.value = 0.18;
      master.connect(audioCtx.destination);
      countdownNodes.push(master);

      // Bass pulse — steady heartbeat rhythm
      for (let i = 0; i < 30; i++) {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = i >= 25 ? 90 : 70;
        env.gain.setValueAtTime(0, now + i);
        env.gain.linearRampToValueAtTime(0.35, now + i + 0.05);
        env.gain.linearRampToValueAtTime(0, now + i + 0.3);
        osc.connect(env);
        env.connect(master);
        osc.start(now + i);
        osc.stop(now + i + 0.35);
        countdownNodes.push(osc);
      }

      // Melody — rising tension notes (think quiz show)
      const melodyNotes = [
        // Phase 1: calm (0-15s) — gentle repeating pattern
        {t:0, f:330, d:0.4}, {t:1, f:392, d:0.4}, {t:2, f:440, d:0.4}, {t:3, f:392, d:0.4},
        {t:4, f:330, d:0.4}, {t:5, f:392, d:0.4}, {t:6, f:440, d:0.4}, {t:7, f:392, d:0.4},
        {t:8, f:349, d:0.4}, {t:9, f:392, d:0.4}, {t:10, f:440, d:0.4}, {t:11, f:494, d:0.4},
        {t:12, f:349, d:0.4}, {t:13, f:392, d:0.4}, {t:14, f:440, d:0.4}, {t:15, f:494, d:0.4},
        // Phase 2: building (15-24s) — ascending, faster feel
        {t:15.5, f:440, d:0.35}, {t:16, f:494, d:0.35}, {t:16.5, f:523, d:0.35}, {t:17, f:494, d:0.35},
        {t:17.5, f:523, d:0.35}, {t:18, f:587, d:0.35}, {t:18.5, f:523, d:0.35}, {t:19, f:587, d:0.35},
        {t:19.5, f:523, d:0.35}, {t:20, f:587, d:0.35}, {t:20.5, f:659, d:0.35}, {t:21, f:587, d:0.35},
        {t:21.5, f:659, d:0.35}, {t:22, f:587, d:0.35}, {t:22.5, f:659, d:0.35}, {t:23, f:698, d:0.35},
        {t:23.5, f:659, d:0.35}, {t:24, f:698, d:0.35},
        // Phase 3: urgent (25-30s) — rapid high notes
        {t:25, f:784, d:0.2}, {t:25.25, f:740, d:0.2}, {t:25.5, f:784, d:0.2}, {t:25.75, f:740, d:0.2},
        {t:26, f:784, d:0.2}, {t:26.25, f:831, d:0.2}, {t:26.5, f:784, d:0.2}, {t:26.75, f:831, d:0.2},
        {t:27, f:880, d:0.2}, {t:27.25, f:831, d:0.2}, {t:27.5, f:880, d:0.2}, {t:27.75, f:831, d:0.2},
        {t:28, f:880, d:0.2}, {t:28.25, f:932, d:0.2}, {t:28.5, f:880, d:0.2}, {t:28.75, f:932, d:0.2},
        {t:29, f:988, d:0.15}, {t:29.15, f:1047, d:0.15}, {t:29.3, f:988, d:0.15},
        {t:29.45, f:1047, d:0.15}, {t:29.6, f:1047, d:0.15}, {t:29.75, f:1047, d:0.2},
      ];

      melodyNotes.forEach(note => {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type = note.t >= 25 ? 'square' : 'triangle';
        osc.frequency.value = note.f;
        const vol = note.t >= 25 ? 0.25 : note.t >= 15 ? 0.18 : 0.12;
        env.gain.setValueAtTime(0, now + note.t);
        env.gain.linearRampToValueAtTime(vol, now + note.t + 0.02);
        env.gain.setValueAtTime(vol, now + note.t + note.d * 0.7);
        env.gain.linearRampToValueAtTime(0, now + note.t + note.d);
        osc.connect(env);
        env.connect(master);
        osc.start(now + note.t);
        osc.stop(now + note.t + note.d + 0.01);
        countdownNodes.push(osc);
      });

      // Tick layer — soft clock tick throughout
      for (let i = 0; i < 30; i++) {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = i >= 25 ? 2000 : 1500;
        const tickVol = i >= 25 ? 0.1 : 0.04;
        env.gain.setValueAtTime(0, now + i);
        env.gain.linearRampToValueAtTime(tickVol, now + i + 0.005);
        env.gain.linearRampToValueAtTime(0, now + i + 0.06);
        osc.connect(env);
        env.connect(master);
        osc.start(now + i);
        osc.stop(now + i + 0.08);
        countdownNodes.push(osc);
      }
    }

    function stopCountdown() {
      countdownNodes.forEach(node => {
        try { node.disconnect(); } catch(e) {}
      });
      countdownNodes = [];
    }

    function playDing() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    function playBuzz() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = 150;
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }
    // --- End sound effects ---

    socket.emit('joinGame', { name, mode, team, avatar });

    // Show player info with avatar
    const infoEl = document.getElementById('playerInfo');
    let avatarHtml = '';
    if (avatar && avatar.startsWith('data:')) {
      avatarHtml = `<img src="${avatar}" class="player-avatar" alt=""> `;
    } else if (avatar) {
      avatarHtml = `<span class="player-avatar-emoji">${avatar}</span> `;
    }
    if (mode === 'team') {
      infoEl.innerHTML = `${avatarHtml}${name} — Team: ${team}`;
    } else {
      infoEl.innerHTML = `${avatarHtml}${name} — Playing solo`;
    }

    socket.on('playerCount', (count) => {
      const el = document.getElementById('playerCount');
      if (el) el.textContent = count + ' player(s) connected';
    });

    socket.on('newQuestion', (q) => {
      hasAnswered = false;
      showOnly('questionView');
      document.getElementById('qNumber').textContent = `Question ${q.index + 1} of ${q.total}`;
      document.getElementById('qText').textContent = q.text;
      document.getElementById('feedback').classList.add('hidden');

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.setAttribute('aria-label', `Option ${i + 1}: ${opt}`);
        btn.onclick = () => submitAnswer(i);
        optionsDiv.appendChild(btn);
      });

      // Resume audio context (needed after user interaction on some browsers)
      if (audioCtx.state === 'suspended') audioCtx.resume();
      playCountdownMusic();

      // Circular dial timer - 30 seconds
      const totalTime = 30;
      let timeLeft = totalTime;
      const circumference = 2 * Math.PI * 45; // r=45
      const ring = document.getElementById('timerRing');
      const timerText = document.getElementById('timerText');
      const dial = document.querySelector('.timer-dial');

      ring.style.strokeDasharray = circumference;
      ring.style.strokeDashoffset = 0;
      timerText.textContent = timeLeft;
      dial.classList.remove('timer-danger');
      ring.classList.remove('danger');

      clearInterval(timerInterval);
      const startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        timeLeft = Math.max(0, totalTime - Math.floor(elapsed));
        const fraction = Math.min(elapsed / totalTime, 1);

        ring.style.strokeDashoffset = circumference * fraction;
        timerText.textContent = timeLeft;

        if (timeLeft <= 5) {
          dial.classList.add('timer-danger');
          ring.classList.add('danger');
        }

        if (timeLeft <= 0) clearInterval(timerInterval);
      }, 100); // update frequently for smooth animation
    });
    function submitAnswer(index) {
      if (hasAnswered) return;
      hasAnswered = true;
      stopCountdown();
      socket.emit('submitAnswer', index);

      // Disable all buttons
      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === index) btn.classList.add('selected');
      });
    }

    socket.on('answerResult', (data) => {
      myScore = data.score;
      if (data.correct) {
        playDing();
      } else {
        playBuzz();
      }
      const fb = document.getElementById('feedback');
      fb.classList.remove('hidden');
      fb.className = 'feedback ' + (data.correct ? 'correct' : 'incorrect');
      fb.textContent = data.correct
        ? `✅ Correct! +${data.points} points`
        : '❌ Wrong answer';
    });

    socket.on('answerRevealed', (data) => {
      clearInterval(timerInterval);
      stopCountdown();
      showOnly('revealView');
      const displayName = mode === 'team' ? `${name} (${team})` : name;
      document.getElementById('revealText').textContent = `Your score: ${myScore}`;
      document.getElementById('scoreText').textContent = '';

      // Show top 10
      const lb = data.leaderboard;
      let html = '<ol class="leaderboard">';
      lb.forEach((p, i) => {
        const highlight = p.name === name || p.name === `🏠 ${team}` ? ' class="you"' : '';
        html += `<li${highlight}>${p.name} — ${p.score} pts</li>`;
      });
      html += '</ol>';
      document.getElementById('revealText').innerHTML = `Your score: ${myScore}` + html;
    });

    socket.on('timerExpired', () => {
      clearInterval(timerInterval);
      stopCountdown();
      if (!hasAnswered) {
        playBuzz();
        const fb = document.getElementById('feedback');
        fb.classList.remove('hidden');
        fb.className = 'feedback incorrect';
        fb.textContent = '⏰ Time\'s up!';
        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
      }
    });

    socket.on('quizFinished', (data) => {
      clearInterval(timerInterval);
      stopCountdown();
      showOnly('finishedView');

      // Find player's position
      const lb = data.leaderboard;
      let myPosition = -1;
      for (let i = 0; i < lb.length; i++) {
        if (lb[i].name === name) { myPosition = i + 1; break; }
      }
      // Also check team position
      let myTeamPosition = -1;
      if (mode === 'team') {
        for (let i = 0; i < lb.length; i++) {
          if (lb[i].name === `🏠 ${team}`) { myTeamPosition = i + 1; break; }
        }
      }

      const medal = myPosition === 1 ? '🥇' : myPosition === 2 ? '🥈' : myPosition === 3 ? '🥉' : '🎉';
      let resultHtml = `<p class="result-name">${medal} ${name}</p>`;
      resultHtml += `<p class="result-score">${myScore} points</p>`;
      if (myPosition > 0) {
        resultHtml += `<p class="result-position">${getOrdinal(myPosition)} place out of ${lb.length}</p>`;
      }
      if (myTeamPosition > 0) {
        resultHtml += `<p class="result-team">Team "${team}" finished ${getOrdinal(myTeamPosition)}</p>`;
      }
      document.getElementById('myResult').innerHTML = resultHtml;

      // Full leaderboard
      let html = '<ol class="leaderboard">';
      lb.forEach((p) => {
        const highlight = p.name === name || p.name === `🏠 ${team}` ? ' class="you"' : '';
        const m = lb.indexOf(p) === 0 ? '🥇 ' : lb.indexOf(p) === 1 ? '🥈 ' : lb.indexOf(p) === 2 ? '🥉 ' : '';
        html += `<li${highlight}>${m}${p.name} — ${p.score} pts</li>`;
      });
      html += '</ol>';
      document.getElementById('finalLeaderboard').innerHTML = html;
    });

    socket.on('gameReset', () => {
      myScore = 0;
      stopCountdown();
      showOnly('waiting');
    });

    function getOrdinal(n) {
      const s = ['th','st','nd','rd'];
      const v = n % 100;
      return n + (s[(v-20)%10] || s[v] || s[0]);
    }

    function showOnly(id) {
      ['waiting', 'questionView', 'revealView', 'finishedView'].forEach(v => {
        document.getElementById(v).classList.toggle('hidden', v !== id);
      });
    }
  </script>
</body>
</html>
